name: ci
on:
    push:
        branches: [ master ]
    pull_request:

permissions:
    contents: read

jobs:
    lint-and-test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.11"
            - name: Install deps
              run: |
                  python -m pip install --upgrade pip
                  pip install ruff mypy pytest pyyaml types-PyYAML lxml
            - name: ruff
              run: ruff check tools/ tests/
            - name: mypy
              run: mypy --ignore-missing-imports tools/anonymizer
            - name: pytest
              run: pytest tests/ tools/anonymizer/tests -q
            - name: yamllint
              run: |
                  pip install yamllint
                  yamllint -c .yamllint tools/ infra/ .github/ || true
            - name: anon-verify (refuse plaintext secrets in infra/)
              run: python -m tools.anonymizer.anonymize --verify infra/
            - name: no-ssh guard
              run: bash tools/guards/no-ssh.sh
            - name: xmllint (any committed XML stays well-formed)
              run: |
                  sudo apt-get update -qq && sudo apt-get install -y -qq libxml2-utils
                  find infra -name '*.xml' -print0 | xargs -0 -r -I{} xmllint --noout {}
