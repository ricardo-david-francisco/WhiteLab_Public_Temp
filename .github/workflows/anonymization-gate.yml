name: anonymization-gate
on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install pyyaml lxml
      - name: Reject any cleartext secrets in committed config
        run: python -m tools.anonymizer.anonymize --verify infra/

  opa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install conftest
        run: |
          curl -sSL https://github.com/open-policy-agent/conftest/releases/download/v0.55.0/conftest_0.55.0_Linux_x86_64.tar.gz \
            | sudo tar -xz -C /usr/local/bin conftest
      - name: Run OPA policies
        run: |
          # Stub: when policies/*.rego are populated, scan infra/ artifacts.
          if ls infra/policies/*.rego >/dev/null 2>&1; then
            conftest test --policy infra/policies infra/ || true
          else
            echo "No .rego policies yet; skipping."
          fi
