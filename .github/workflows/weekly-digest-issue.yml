name: weekly-digest

on:
  schedule:
    # Mondays 06:30 UTC — after critique-sync (06:00) so today's
    # newly-imported critiques show up in the digest.
    - cron: "30 6 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

concurrency:
  group: weekly-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Render digest
        id: render
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p .scratch
          out=.scratch/digest.md
          {
            echo "<!-- whitelab-weekly-digest -->"
            echo
            echo "# Weekly digest — $(date -u +%Y-%m-%d)"
            echo
            echo "_Auto-generated by \`.github/workflows/weekly-digest-issue.yml\`._"
            echo "_Re-runs every Monday at 06:30 UTC and on demand._"
            echo
            echo "## Open issues by status"
            echo
            for label in status:inbox status:next status:in-progress status:blocked; do
              count=$(gh issue list --repo "$REPO" --state open \
                       --label "$label" --json number --jq 'length')
              echo "- \`$label\`: **$count**"
            done
            echo
            echo "## Stale (open ≥14 days, no activity)"
            echo
            gh issue list --repo "$REPO" --state open \
              --label stale \
              --json number,title,url \
              --jq '.[] | "- [#\(.number)](\(.url)) \(.title)"' || true
            echo
            echo "## Critique findings still open"
            echo
            gh issue list --repo "$REPO" --state open \
              --label critique \
              --json number,title,url \
              --jq '.[] | "- [#\(.number)](\(.url)) \(.title)"' || true
            echo
            echo "## Recently merged PRs (last 7 days)"
            echo
            since=$(date -u -d "7 days ago" +%Y-%m-%d)
            gh pr list --repo "$REPO" --state merged \
              --search "merged:>=$since" \
              --json number,title,url,mergedAt \
              --jq '.[] | "- [#\(.number)](\(.url)) \(.title) — merged \(.mergedAt|split("T")[0])"' || true
          } > "$out"
          echo "path=$out" >> "$GITHUB_OUTPUT"

      - name: Upsert digest issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          existing=$(gh issue list --repo "$REPO" --state open \
            --search 'in:body "<!-- whitelab-weekly-digest -->"' \
            --json number --jq '.[0].number // empty')
          title="Weekly digest — $(date -u +%Y-%m-%d)"
          if [[ -z "$existing" ]]; then
            gh issue create --repo "$REPO" \
              --title "$title" \
              --body-file .scratch/digest.md \
              --label pinned --label docs >/dev/null
          else
            gh issue edit "$existing" --repo "$REPO" \
              --title "$title" \
              --body-file .scratch/digest.md >/dev/null
          fi
