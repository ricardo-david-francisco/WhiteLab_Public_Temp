# WhiteLab anonymizer rules.
# Declarative regex catalog + format hook references. The actual format
# hooks are Python callables in tools/anonymizer/format_hooks/.
#
# Hard rule: every rule MUST have a `class` from the placeholder grammar
# in docs/architecture/2.0-fortress-design.md §5.3. New classes are
# added by amending both this file and lexicon.example.yaml in the same
# PR, gated by the OPA policy infra/policies/secrets.rego.

version: 1

regex_rules:

  - class: MAC
    description: IEEE 802 MAC address (colon or hyphen separated)
    pattern: "(?<![0-9A-Fa-f:-])([0-9A-Fa-f]{2}([:-])[0-9A-Fa-f]{2}\\2[0-9A-Fa-f]{2}\
      \\2[0-9A-Fa-f]{2}\\2[0-9A-Fa-f]{2}\\2[0-9A-Fa-f]{2})(?![0-9A-Fa-f:-])"
    # MACs that anchor placeholder names (XX:XX:XX:XX:XX:XX) are skipped
    # by the validator; broadcast / multicast / locally-administered are
    # preserved verbatim.
    validator: not_placeholder_mac

  - class: PUBLIC_IPV4
    description: Globally-routable IPv4 (excludes RFC1918, loopback, link-local,
      CGNAT, multicast, doc-test)
    pattern: "(?<![0-9.])((?:\\d{1,3}\\.){3}\\d{1,3})(?![0-9.])"
    validator: is_public_ipv4

  - class: PUBLIC_IPV6
    description: Globally-routable IPv6 (excludes ULA fc00::/7, link-local
      fe80::/10, loopback)
    pattern: "(?<![0-9A-Fa-f:])([0-9A-Fa-f]{1,4}(?::[0-9A-Fa-f]{1,4}){2,7})(?![0-9A\
      -Fa-f:])"
    validator: is_public_ipv6

  - class: TAILNET
    description: Tailscale tailnet name (the user-chosen prefix of *.ts.net)
    pattern: "([a-z0-9-]{4,32})\\.ts\\.net"
    validator: is_tailscale_tailnet
    capture: 1

  - class: WG_PRIV
    description: WireGuard private key (44-char base64 ending in '=')
    pattern: "(?<![A-Za-z0-9+/=])([A-Za-z0-9+/]{43}=)(?![A-Za-z0-9+/=])"
    validator: is_wireguard_private_key

  - class: WG_PUB
    description: WireGuard public key (matches WG_PRIV regex; class assigned by
      context — only XPath hook discriminates)
    # Generic regex cannot tell pub from priv; the format hook for
    # opnsense_xml resolves this via XPath. The generic text scrub
    # treats both as WG_KEY_<n>.

  - class: AGE_PUB
    description: age public key
    pattern: "age1[ac-hj-np-z02-9]{58}"

  - class: AGE_PRIV
    description: age secret key
    pattern: "AGE-SECRET-KEY-1[AC-HJ-NP-Z02-9]{58}"

  - class: SSH_PRIV
    description: OpenSSH private key block
    pattern: "-----BEGIN OPENSSH PRIVATE KEY-----[\\s\\S]+?-----END OPENSSH PRIVATE
      KEY-----"

  - class: TLS_PRIV
    description: PEM-encoded RSA / EC private key
    pattern: "-----BEGIN (?:RSA |EC )?PRIVATE KEY-----[\\s\\S]+?-----END (?:RSA |EC
      )?PRIVATE KEY-----"

  - class: JWT
    description: JSON Web Token
    pattern: "eyJ[A-Za-z0-9_-]{10,}\\.[A-Za-z0-9_-]{10,}\\.[A-Za-z0-9_-]{10,}"

  - class: SOPS_BLOB
    description: SOPS-encrypted ENC[...] envelope (left in place is OK; this rule
      flags raw ENC[] outside expected files)
    pattern: "ENC\\[AES256_GCM,data:[A-Za-z0-9+/=]+,iv:[A-Za-z0-9+/=]+,tag:[A-Za-z0\
      -9+/=]+,type:str\\]"
    keep: true # whitelist: legitimate when in *.sops.yaml; flagged elsewhere

  - class: SNYK_TOKEN
    description: Snyk API token (UUIDv4)
    pattern: "(?<![0-9a-f-])[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-\
      [0-9a-f]{12}(?![0-9a-f-])"
    # UUIDv4 is also used by OPNsense for zone IDs; XPath hook
    # discriminates. Generic mode flags anything looking like a UUID
    # found in *.env files.

  # -- assignment-style secrets (PR #24) ------------------------------
  # The patterns below capture only the *value* portion via a capture
  # group, so the surrounding key/operator stays intact. Idempotency
  # is preserved by the placeholder check inside scrub_text.

  - class: PASSWORD
    description: Password assignment (key=value or key:value, quoted or bare).
    pattern: "(?i)(?:password|passwd|passphrase|pwd)\\s*[:=]\\s*[\"']?([^\"'\\s,;]\
      {6,})[\"']?"
    capture: 1
    validator: is_real_secret

  - class: BEARER_TOKEN
    description: HTTP Bearer / Basic auth header token.
    pattern: "(?i)(?:Authorization|Bearer)\\s*[:=]?\\s*[\"']?([A-Za-z0-9._\\-+/]\
      {16,})[\"']?"
    capture: 1
    validator: is_real_secret

  - class: API_KEY
    description: api_key / apikey / api-key / x-api-key assignment.
    pattern: "(?i)(?:api[_\\-]?key|x[_\\-]?api[_\\-]?key)\\s*[:=]\\s*[\"']?([A-Za-z\
      0-9._\\-]{12,})[\"']?"
    capture: 1
    validator: is_real_secret

  - class: GENERIC_SECRET
    description: Catch-all *_secret = "..." / *_token = "...".
    pattern: "(?i)(?:[a-z][a-z0-9_]*_(?:secret|token))\\s*[:=]\\s*[\"']?([A-Za-z0\
      -9._\\-+/]{12,})[\"']?"
    capture: 1
    validator: is_real_secret

format_hooks:

  - format: opnsense_xml
    handler: tools.anonymizer.format_hooks.opnsense:scrub
    description: |
      Schema-aware OPNsense config.xml scrub. Replaces:
        //system/user/password               -> OPNSENSE_PWD_HASH_<n>
        //system/user/apikeys/item/key       -> OPNSENSE_API_KEY_<n>
        //system/user/apikeys/item/secret    -> OPNSENSE_API_SEC_<n>
        //dhcpd/*/staticmap/mac              -> MAC_<n>
        //wireguard/server/privkey           -> WG_PRIV_<n>
        //wireguard/server/pubkey            -> WG_PUB_<n>
        //wireguard/peer/psk                 -> WG_PSK_<n>
        //wireguard/peer/publickey           -> WG_PUB_<n>
        //openvpn/*/tlsauth                  -> OPENVPN_TLSAUTH_<n>
        //openvpn/*/private                  -> TLS_PRIV_<n>
        //ipsec/*/preshared                  -> IPSEC_PSK_<n>
        //ssh/authorizedkeys                 -> SSH_AUTH_KEYS_<n>
        //captiveportal/zones/*/users/user/password -> CP_USER_PWD_<n>
        //wan/spoofmac                       -> MAC_<n>
        //system/hostname                    -> HOST_PRIMARY
        //system/domain                      -> TAILNET
        //cert/*/prv                         -> TLS_PRIV_<n>
        //cert/*/crt                         -> TLS_CERT_<n>     (kept in clear if self-signed; redacted otherwise)
      And all generic regex rules above on remaining text nodes.

  - format: proxmox_tfacfg
    handler: tools.anonymizer.format_hooks.proxmox:scrub_tfa
    description: Mask TOTP secrets and WebAuthn descriptors in /etc/pve/priv/tfa.cfg.

  - format: proxmox_clusterfw
    handler: tools.anonymizer.format_hooks.proxmox:scrub_clusterfw
    description: Preserve rule semantics, scrub comment-embedded hostnames and notes.

  - format: omada_db
    handler: tools.anonymizer.format_hooks.omada:scrub_backup
    description: Anonymize Omada controller backup (.cfg) — device MACs, AP serials,
      RADIUS PSK.

  - format: caddy
    handler: tools.anonymizer.format_hooks.caddy:scrub_logs
    description: Strip resolved upstream IPs / cert log lines from Caddy access logs.

  - format: text
    handler: null
    description: Generic text — apply regex_rules only.
